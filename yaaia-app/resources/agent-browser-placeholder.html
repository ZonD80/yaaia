<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d9488">
  <title>Agent Browser — YAAIA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .agent-banner {
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
      color: #fff;
      padding: 0.75rem 1.25rem;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-align: center;
      text-transform: uppercase;
    }

    .message {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 420px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .message-main {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .message-note {
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="agent-banner">Agent Browser — YAAIA</div>
  <div class="message">
    <p class="message-main">Just for you to know. This is your AI agent browser. You can see what your agent will be
      doing.</p>
    <p class="message-note">Focus will return to the YAAIA window in a few seconds.</p>
  </div>
</body>

</html>
